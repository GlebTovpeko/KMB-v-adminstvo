version: '3.8'

services:
  # --- База данных ---
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: crud_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Кэш ---
  redis:
    image: redis:7-alpine
    networks:
      - app-net

  # --- Flask Приложение ---
  flask_app:
    build: .
    command: ["gunicorn", "--bind", "0.0.0.0:5000", "--workers", "4", "app:app"]
    expose:
      - "5000"
    environment:
      PG_HOST: postgres
      PG_PORT: 5432
      PG_NAME: crud_db
      PG_USER: postgres
      PG_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - app-net
      - monitoring-net
    restart: unless-stopped

  # --- Nginx ---
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - flask_app
    networks:
      - app-net
    restart: unless-stopped

  # --- Node Exporter ---
  node_exporter:
    image: prom/node-exporter:latest
    command:
      - '--path.rootfs=/host'
    pid: host
    volumes:
      - '/:/host:ro,rslave'
    networks:
      - monitoring-net
    restart: unless-stopped

  # --- Nginx Exporter ---
  nginx_exporter:
    image: nginx/nginx-prometheus-exporter:1.3.0
    command:
      - '-nginx.scrape-uri=http://nginx:80/status'
    depends_on:
      - nginx
    networks:
      - app-net
      - monitoring-net
    restart: unless-stopped

  # --- Postgres Exporter ---
  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:latest
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:postgres@postgres:5432/crud_db?sslmode=disable"
    depends_on:
      - postgres
    networks:
      - app-net
      - monitoring-net
    restart: unless-stopped

  # --- Prometheus ---
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    depends_on:
      - flask_app
      - node_exporter
      - nginx_exporter
      - postgres_exporter
    networks:
      - monitoring-net
    restart: unless-stopped

  # --- Grafana ---
  grafana:
    image: grafana/grafana:latest
    user: "472"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=123
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - monitoring-net
    restart: unless-stopped

volumes:
  pg_data:
  prometheus_data:
  grafana_data:

networks:
  app-net:
    driver: bridge
  monitoring-net:
    driver: bridge