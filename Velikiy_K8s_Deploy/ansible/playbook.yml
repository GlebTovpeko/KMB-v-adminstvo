---
- name: Setup K3s and ArgoCD
  hosts: k3s_master
  become: true
  
  tasks:
    - name: Install K3s
      shell: curl -sfL https://get.k3s.io | sh -
      args:
        creates: /etc/rancher/k3s/k3s.yaml
    
    - name: Wait for K3s
      shell: k3s kubectl get nodes
      register: result
      retries: 5
      delay: 10
      until: result.rc == 0
    
    - name: Read kubeconfig from VM
      command: cat /etc/rancher/k3s/k3s.yaml
      register: kubeconfig_content
      changed_when: false
    
    - name: Create .kube directory on host
      file:
        path: ~/.kube
        state: directory
        mode: '0755'
      delegate_to: localhost
      become: false
    
    - name: Save kubeconfig to host with correct IP
      copy:
        content: "{{ kubeconfig_content.stdout | replace('127.0.0.1', '192.168.122.75') }}"
        dest: ~/.kube/config
        mode: '0600'
      delegate_to: localhost
      become: false
    
    - name: Install Helm
      shell: curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      args:
        creates: /usr/local/bin/helm
    
    - name: Install ArgoCD
      shell: |
        kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f - || true
        kubectl apply -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml || true
        sleep 30
      args:
        creates: /etc/rancher/k3s/argocd-installed
      ignore_errors: true
    
    - name: Wait for ArgoCD server
      shell: |
        kubectl wait --for=condition=available deployment/argocd-server -n argocd --timeout=300s || true
      ignore_errors: true
    
    - name: Mark ArgoCD installed
      file:
        path: /etc/rancher/k3s/argocd-installed
        state: touch