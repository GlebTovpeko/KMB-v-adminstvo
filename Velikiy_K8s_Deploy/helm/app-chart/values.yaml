replicaCount: 2

image:
  repository: gleb1337/velikiy-app
  tag: latest

service:
  type: ClusterIP
  port: 80

env:
  PG_HOST: postgres-service.database.svc.cluster.local
  PG_NAME: crud_db
  PG_USER: postgres
  PG_PASSWORD: postgres

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi